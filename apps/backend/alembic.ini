# Alembic configuration for the Lava backend.
# Docs: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Prepend the revision id to auto-generated migration filenames
file_template = %%(rev)s_%%(slug)s

# sys.path entry prepended before importing env.py — lets us import `app.*`
prepend_sys_path = .

# Timezone for generated migration timestamps
timezone = UTC

# Maximum length for migration file slugs
truncate_slug_length = 40

# The DSN is read at runtime from the DATABASE_URL environment variable
# inside alembic/env.py, so sqlalchemy.url is intentionally left blank here.
sqlalchemy.url =


[post_write_hooks]
# Optional hooks — e.g. run black on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 88


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
